databases:
  - name: hiregenie-ai-db
    plan: free

services:
  - type: web
    name: hiregenie-ai-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health/
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hiregenie-ai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: FRONTEND_URL
        value: "https://your-vercel-app.vercel.app"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-vercel-app.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://your-vercel-app.vercel.app"
      - key: AI_PROVIDER
        value: "gemini"
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ACCESS_TOKEN_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_DAYS
        value: "7"
